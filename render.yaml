services:
  - type: web
    name: quiniela-mundial-2026
    runtime: python
    plan: free
    buildCommand: pip install -r quiniela_dashboard/requirements.txt
    startCommand: python quiniela_dashboard/app.py --host 0.0.0.0 --port $PORT --quiniela-dir quiniela_dashboard/data
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
